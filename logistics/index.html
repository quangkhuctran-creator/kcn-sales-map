function plotCenter(coords){
  const lons=coords.map(c=>c[0]),lats=coords.map(c=>c[1]);
  return[(Math.min(...lons)+Math.max(...lons))/2,(Math.min(...lats)+Math.max(...lats))/2];
}

      polygon:{
        hierarchy:Cesium.Cartesian3.fromDegreesArray(flat),
        material:Cesium.Color.fromCssColorString(cfg.fill).withAlpha(0.55),
        outline:true,outlineColor:Cesium.Color.fromCssColorString(cfg.line),outlineWidth:2,
        height:0,extrudedHeight:8,
      },
      label:{
        text:p.id+'\n'+(p.area/1000).toFixed(1)+'k m²',
        position:Cesium.Cartesian3.fromDegrees(cx,cy,14),
        font:'700 13px monospace',
        fillColor:Cesium.Color.fromCssColorString(cfg.line),
        outlineColor:Cesium.Color.BLACK,outlineWidth:2,
        style:Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin:Cesium.VerticalOrigin.CENTER,
        horizontalOrigin:Cesium.HorizontalOrigin.CENTER,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        scaleByDistance:new Cesium.NearFarScalar(400,1.1,3000,0.25),
      },
    });
    e._plotData=p;
    entities.push({entity:e,plot:p});
  });

  INFRA.forEach(i=>{
    viewer.entities.add({
      position:Cesium.Cartesian3.fromDegrees(i.lon,i.lat,5),
      label:{
        text:i.icon+' '+i.label,font:'11px sans-serif',
        fillColor:Cesium.Color.fromCssColorString('#94a3b8'),
        outlineColor:Cesium.Color.BLACK,outlineWidth:2,
        style:Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        scaleByDistance:new Cesium.NearFarScalar(200,1,2000,0.2),
      },
    });
  });

  const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction(e=>{
    const p=viewer.scene.pick(e.position);
    if(Cesium.defined(p)&&p.id&&p.id._portData){
      showPortInfo(p.id._portData);
      viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(p.id._portData.lon,p.id._portData.lat,3000),orientation:{heading:0,pitch:Cesium.Math.toRadians(-45),roll:0},duration:1.5});
    } else if(Cesium.defined(p)&&p.id&&p.id._plotData){
      showInfo(p.id._plotData);
      const [cx,cy]=plotCenter(p.id._plotData.coords);
      viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(cx,cy,380),orientation:{heading:0,pitch:Cesium.Math.toRadians(-45),roll:0},duration:1.5});
    } else {
      document.getElementById('info').style.display='none';
    }
  },Cesium.ScreenSpaceEventType.LEFT_CLICK);

  viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(106.952,10.976,1800),
    orientation:{heading:0,pitch:Cesium.Math.toRadians(-55),roll:0},duration:2.5,
  });

  addChat('assistant','🌍 Cesium 3D Globe sẵn sàng!\n\nClick vào lô màu xanh/vàng/xám trên bản đồ, hoặc hỏi tôi về giá thuê, hạ tầng, FDI.');
});

function flyTo(lon,lat,h,pitch){
  viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(lon,lat,h),orientation:{heading:0,pitch:Cesium.Math.toRadians(pitch),roll:0},duration:2});
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  entities.forEach(({entity,plot})=>{ entity.show=f==='all'||plot.status===f; });
  document.getElementById('info').style.display='none';
}

  {lon:106.9503,lat:10.9762,h:600,pitch:-50,label:'📍 Zone C – Siêu lô 40m'},
  {lon:106.9510,lat:10.9748,h:350,pitch:-45,label:'⚡ Trạm 110kV & WWTP'},

];

async function startTour(){
  if(touring){tourCancel=true;document.getElementById('tour-btn').textContent='🎬 Auto Tour KCN';return;}
  tourCancel=false;touring=true;
  document.getElementById('tour-btn').textContent='⏹ Dừng tour';
  addChat('assistant','🎬 Bắt đầu Auto Tour KCN Long Thành...');
  for(const s of TOUR_STOPS){
    if(tourCancel)break;
    viewer.camera.flyTo({destination:Cesium.Cartesian3.fromDegrees(s.lon,s.lat,s.h),orientation:{heading:0,pitch:Cesium.Math.toRadians(s.pitch),roll:0},duration:2.5});
    await new Promise(r=>setTimeout(r,3200));
    if(!tourCancel)addChat('assistant',s.label);
  }
  touring=false;tourCancel=false;
  document.getElementById('tour-btn').textContent='🎬 Auto Tour KCN';
  if(!tourCancel)addChat('assistant','✅ Tour hoàn thành! Click lô đất để xem chi tiết.');
}

function addChat(role,text){
  chatMsgs.push({role,text});
  const c=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className='msg'+(role==='user'?' user':'');
  const b=document.createElement('div');
  b.className='bubble '+(role==='user'?'user':'ai');
  b.textContent=text;
  d.appendChild(b);
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

async function ask(text,addUser=true){
  if(!text||!text.trim())return;
  document.getElementById('chat-inp').value='';
  if(addUser)addChat('user',text);
  const msgs=[...chatMsgs.slice(-10).map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.text})),{role:'user',content:text}];
  const dots=document.createElement('div');dots.className='msg';
  const db=document.createElement('div');db.className='bubble ai dot-spin';
  [0,1,2].forEach(()=>{const s=document.createElement('span');s.style.animation=`bounce .9s ease-in-out ${Math.random().toFixed(1)}s infinite`;db.appendChild(s);});
  dots.appendChild(db);document.getElementById('chat-msgs').appendChild(dots);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:KCN_PROMPT,messages:msgs})
    });
    const data=await res.json();
    dots.remove();
    addChat('assistant',data.content?.[0]?.text||'Thử lại nhé!');
  }catch(e){dots.remove();addChat('assistant','Lỗi kết nối!');}
}

let logisticsVisible=false;
let portEntities=[];
let routeEntities=[];

function toggleLogistics(){
  logisticsVisible=!logisticsVisible;
  const btn=document.getElementById('logistics-btn');
  if(logisticsVisible){
    btn.style.background='#1e3a5f';
    btn.style.borderColor='#3b82f6';
    btn.style.color='#60a5fa';
    showLogistics();
  } else {
    btn.style.background='#0d1117dd';
    btn.style.borderColor='#1e293b';
    hideLogistics();
  }
}

function showLogistics(){
  // Draw route polylines
  ROUTES.forEach(r=>{
    const mid=[(r.from[0]+r.to[0])/2,(r.from[1]+r.to[1])/2];
    const e=viewer.entities.add({
      polyline:{
        positions:Cesium.Cartesian3.fromDegreesArray([...r.from,...r.to]),
        width:2.5,
        material:new Cesium.PolylineDashMaterialProperty({
          color:Cesium.Color.fromCssColorString(r.color).withAlpha(0.8),
          dashLength:16,
        }),
        clampToGround:true,
      }
    });
    routeEntities.push(e);
  });

  // Add port markers
  PORTS.forEach(p=>{
    const e=viewer.entities.add({
      id:'port-'+p.id,
      position:Cesium.Cartesian3.fromDegrees(p.lon,p.lat,0),
      billboard:{
        image:createPortIcon(p.icon,p.type),
        width:40,height:40,
        verticalOrigin:Cesium.VerticalOrigin.BOTTOM,
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        scaleByDistance:new Cesium.NearFarScalar(5000,1.2,500000,0.5),
      },
      label:{
        text:p.label,
        font:'700 12px sans-serif',
        fillColor:Cesium.Color.WHITE,
        outlineColor:Cesium.Color.BLACK,
        outlineWidth:2,
        style:Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin:Cesium.VerticalOrigin.TOP,
        pixelOffset:new Cesium.Cartesian2(0,4),
        disableDepthTestDistance:Number.POSITIVE_INFINITY,
        scaleByDistance:new Cesium.NearFarScalar(5000,1,200000,0.4),
      },
      _portData:p,
    });
    portEntities.push(e);
  });

  addChat('assistant','🚢 Logistics Layer đã bật! Hiển thị 5 tuyến kết nối: Cảng Cái Mép 35km, Cảng Cát Lái 45km, Cảng Phú Mỹ 40km, Sân bay Long Thành 8km, Cao tốc 2km. Click icon để xem chi tiết!');
}

function hideLogistics(){
  routeEntities.forEach(e=>viewer.entities.remove(e));
  portEntities.forEach(e=>viewer.entities.remove(e));
  routeEntities=[];portEntities=[];
  document.getElementById('port-info').style.display='none';
}

function createPortIcon(icon,type){
  const colors={port:'#3b82f6',airport:'#a78bfa',road:'#64748b'};
  const c=document.createElement('canvas');
  c.width=60;c.height=60;
  const ctx=c.getContext('2d');
  ctx.fillStyle=colors[type]||'#3b82f6';
  ctx.beginPath();ctx.arc(30,30,28,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
  ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icon,30,30);
  return c.toDataURL();
}

    </div>

}
